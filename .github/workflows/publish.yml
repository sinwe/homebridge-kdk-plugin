name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump — patch, minor, major, or exact (e.g. 1.2.0)'
        required: true
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Authorize
        if: github.actor != 'sinwe'
        run: |
          echo "Only sinwe can trigger this workflow"
          exit 1

      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for Trusted Publishing support
        run: npm install -g npm@11

      - run: npm ci

      - run: npm test

      - name: Bump version and tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          npm version $VERSION -m "Release v%s"

      - name: Publish
        run: npm publish --provenance

      - name: Push version commit and tag
        run: git push origin master --follow-tags
